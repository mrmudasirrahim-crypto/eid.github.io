<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak Celebration</title>
<style>
body, html {
  margin: 0;
  padding: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: #FFD700;
}

.page { display: none; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100vh; text-align: center; }
.active { display: flex; }

input {
  padding: 10px;
  width: 220px;
  border-radius: 8px;
  border: none;
  font-size: 1rem;
  text-align: center;
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  background: #FFA500;
  color: #fff;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
}
button:hover { background: #FF8C00; }

h1 { font-size: 3rem; margin: 10px 0; color: #fff; text-shadow: 2px 2px #000; }
p { font-size: 1.2rem; color: #fff; text-shadow: 1px 1px #000; }
</style>
</head>
<body>

<!-- Background Music -->
<audio id="eidMusic" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<!-- Page 1: Enter Name -->
<div id="page1" class="page active">
  <h1>Enter your name</h1>
  <input type="text" placeholder="Enter your name" id="userName">
  <button onclick="showEidPage()">Click Here</button>
</div>

<!-- Page 2: Eid Mubarak -->
<div id="page2" class="page">
  <canvas id="fireworksCanvas"></canvas>
  <div style="position:absolute;top:20%;width:100%;">
    <h1 id="eidMessage"></h1>
    <p>May Allah bless you with happiness, success, and peace 🌙✨🏮</p>
  </div>
</div>

<script>
// Page switch and capture name
function showEidPage() {
  const name = document.getElementById('userName').value.trim();
  const displayName = name ? name : "Friend"; // Default if user leaves empty
  document.getElementById('eidMessage').textContent = `${displayName} – Eid Mubarak from Talal Farooqi`;

  document.getElementById('page1').classList.remove('active');
  document.getElementById('page2').classList.add('active');

  const music = document.getElementById('eidMusic');
  music.play().catch(()=>{});

  startFireworks();
}

// Fireworks using Canvas
function startFireworks() {
  const canvas = document.getElementById('fireworksCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const fireworks = [];

  function random(min, max){ return Math.random() * (max - min) + min; }

  class Firework {
    constructor(){
      this.x = random(0, canvas.width);
      this.y = canvas.height;
      this.targetY = random(100, canvas.height/2);
      this.particles = [];
      this.color = `hsl(${Math.floor(random(0,360))},100%,50%)`;
      this.exploded = false;
    }
    update(){
      if(!this.exploded){
        this.y -= 5;
        if(this.y <= this.targetY) this.explode();
      }
      this.particles.forEach(p=>{
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.05;
        p.alpha -= 0.02;
      });
      this.particles = this.particles.filter(p=>p.alpha>0);
    }
    draw(){
      if(!this.exploded){
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x,this.y,3,0,Math.PI*2);
        ctx.fill();
      }
      this.particles.forEach(p=>{
        ctx.fillStyle = `hsla(${p.color},100%,50%,${p.alpha})`;
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fill();
      });
    }
    explode(){
      this.exploded = true;
      for(let i=0;i<50;i++){
        this.particles.push({
          x:this.x,
          y:this.y,
          vx:random(-5,5),
          vy:random(-5,5),
          alpha:1,
          color:Math.floor(random(0,360))
        });
      }
    }
    done(){ return this.exploded && this.particles.length===0; }
  }

  function animate(){
    ctx.fillStyle='rgba(0,0,0,0.1)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    if(Math.random()<0.05) fireworks.push(new Firework());
    fireworks.forEach(f=>{ f.update(); f.draw(); });
    for(let i=fireworks.length-1;i>=0;i--){
      if(fireworks[i].done()) fireworks.splice(i,1);
    }
    requestAnimationFrame(animate);
  }
  animate();
}

// Resize canvas
window.addEventListener('resize', ()=>{
  const canvas = document.getElementById('fireworksCanvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
